[build]
  command = "npm run build:client"
  publish = "dist"

# Open Graph / Twitter cards for product links (static SPA otherwise has no per-product meta).
# Set PUBLIC_API_ORIGIN (or SHARE_API_ORIGIN) in Netlify to your API base, e.g. https://your-app.up.railway.app
[[edge_functions]]
  path = "/product/*"
  function = "product-meta"

# نفس أصل الـ API — الصور المحفوظة تحت /uploads على الخادم وليست في dist
[[redirects]]
  from = "/uploads/*"
  to = "https://crassistore-production.up.railway.app/uploads/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/*"
  to = "https://crassistore-production.up.railway.app/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
